[build]
base = "apps/web"
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "22"
NEXT_PUBLIC_SITE_URL = "https://cvecarairig.rs"
NEXT_PUBLIC_BRAND_NAME = "Online Cvećara Irig"
NEXT_PUBLIC_DEFAULT_LOCALE = "sr"
NEXT_PUBLIC_CONTACT_EMAIL = "cvecaralotos022@gmail.com"
ADMIN_ALLOWED_ORIGINS = "https://cvecarairig.rs,https://www.cvecarairig.rs"

[[plugins]]
package = "@netlify/plugin-nextjs"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "max-age=31536000, immutable"

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
